# 1. Crear el entorno con Python 3.10 para entrenamiento de yolo
conda create -n airix python=3.10 -y

# 2. Activar el entorno
conda activate airix

# 3. Instalar dependencias principales (YOLO, Hugging Face, Procesamiento de imágenes)
pip install ultralytics transformers datasets pillow opencv-python matplotlib

# 4. Instalar soporte para Notebooks
pip install ipykernel notebook

# 5. Registrar el entorno en Jupyter para que aparezca como kernel
python -m ipykernel install --user --name airix --display-name "Python (airix)"